<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MilkMan - Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="mm-page">
    <nav class="navbar navbar-expand-lg mm-nav">
      <div class="container">
        <a class="navbar-brand mm-brand" href="index.html">MilkMan</a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-sm btn-outline-secondary" href="index.html">Home</a>
        </div>
      </div>
    </nav>

    <main class="container mm-auth py-5">
      <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
          <div class="mm-auth-shell">
            <div class="mm-auth-hero">
              <h1 class="mm-auth-title">Fresh dairy, delivered daily.</h1>
              <p class="mm-auth-subtitle">
                Create an account to start subscriptions, manage deliveries, and track your orders.
              </p>
              <div class="mm-auth-badges">
                <span class="mm-pill">Farm-fresh</span>
                <span class="mm-pill">Quality tested</span>
                <span class="mm-pill">On-time delivery</span>
              </div>
            </div>

            <div class="mm-auth-card">
              <div class="d-flex gap-2 mb-3">
                <button class="btn btn-sm mm-tab is-active" data-tab="login">Login</button>
                <button class="btn btn-sm mm-tab" data-tab="signup">Sign up</button>
              </div>

              <div id="mm-alert" class="alert d-none" role="alert"></div>

              <form id="mm-login" class="mm-form">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    name="email"
                    type="email"
                    class="form-control mm-input"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    name="password"
                    type="password"
                    class="form-control mm-input"
                    placeholder="Minimum 8 characters"
                    autocomplete="current-password"
                    required
                  />
                </div>
                <button class="btn mm-btn-primary w-100" type="submit">
                  Continue
                </button>
              </form>

              <form id="mm-signup" class="mm-form d-none">
                <div class="mb-3">
                  <label class="form-label">Full name</label>
                  <input
                    name="name"
                    type="text"
                    class="form-control mm-input"
                    placeholder="Your name"
                    autocomplete="name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    name="email"
                    type="email"
                    class="form-control mm-input"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                  />
                </div>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Phone (optional)</label>
                    <input
                      name="phone"
                      type="tel"
                      class="form-control mm-input"
                      placeholder="+91"
                      autocomplete="tel"
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input
                      name="password"
                      type="password"
                      class="form-control mm-input"
                      placeholder="Minimum 8 characters"
                      autocomplete="new-password"
                      required
                    />
                  </div>
                </div>
                <div class="mt-3">
                  <label class="form-label">Address (optional)</label>
                  <textarea
                    name="address"
                    class="form-control mm-input"
                    rows="2"
                    placeholder="Delivery address"
                    autocomplete="street-address"
                  ></textarea>
                </div>
                <button class="btn mm-btn-primary w-100 mt-3" type="submit">
                  Create account
                </button>
              </form>

              <div class="mm-auth-footer mt-3">
                <span class="text-muted">Need help?</span>
                <a href="index.html#contact" class="mm-link">Contact support</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script>
      const alertBox = document.getElementById("mm-alert");
      const tabs = Array.from(document.querySelectorAll("[data-tab]"));
      const loginForm = document.getElementById("mm-login");
      const signupForm = document.getElementById("mm-signup");

      function showAlert(type, message) {
        alertBox.className = "alert";
        alertBox.classList.add(type === "success" ? "alert-success" : "alert-danger");
        alertBox.textContent = message;
        alertBox.classList.remove("d-none");
      }

      function hideAlert() {
        alertBox.classList.add("d-none");
      }

      function setTab(name) {
        hideAlert();
        tabs.forEach((t) => t.classList.toggle("is-active", t.dataset.tab === name));
        loginForm.classList.toggle("d-none", name !== "login");
        signupForm.classList.toggle("d-none", name !== "signup");
      }

      tabs.forEach((btn) =>
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          setTab(btn.dataset.tab);
        })
      );

      function goNext() {
        const next = sessionStorage.getItem("mm_next");
        if (next) {
          sessionStorage.removeItem("mm_next");
          window.location.href = next;
          return;
        }
        window.location.href = "dashboard.html";
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAlert();
        const fd = new FormData(loginForm);
        const payload = Object.fromEntries(fd.entries());
        try {
          await window.MilkMan.auth.login(payload);
          goNext();
        } catch (err) {
          showAlert("error", err.message || "Login failed");
        }
      });

      signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAlert();
        const fd = new FormData(signupForm);
        const payload = Object.fromEntries(fd.entries());
        try {
          await window.MilkMan.auth.signup(payload);
          goNext();
        } catch (err) {
          showAlert("error", err.message || "Signup failed");
        }
      });

      (async () => {
        try {
          await window.MilkMan.auth.me();
          goNext();
        } catch {}
      })();
    </script>
  </body>
</html>
