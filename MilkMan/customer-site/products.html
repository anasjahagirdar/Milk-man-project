<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MilkMan - Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="mm-page">
    <nav class="navbar navbar-expand-lg mm-nav sticky-top">
      <div class="container">
        <a class="navbar-brand mm-brand" href="index.html">MilkMan</a>
        <div class="ms-auto d-flex gap-2 align-items-center">
          <a id="mm-account-link" class="btn btn-sm mm-btn-secondary" href="login.html">Login</a>
          <button id="mm-logout" class="btn btn-sm btn-outline-danger d-none" type="button">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
        <div>
          <h1 class="mm-section-title mb-2">Products</h1>
          <p class="mm-section-subtitle mb-0">
            Subscribe with your preferred quantity and frequency. Preview monthly cost instantly.
          </p>
        </div>
        <a class="btn mm-btn-secondary" href="dashboard.html">Go to dashboard</a>
      </div>

      <div id="mm-products" class="row g-4"></div>
      <div id="mm-products-loading" class="text-muted">Loading products...</div>
      <div id="mm-products-empty" class="text-muted d-none">
        No products found. Add products from the admin panel.
      </div>
    </main>

    <div class="modal fade" id="mmSubModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">
          <div class="modal-header">
            <div>
              <div class="fw-bold" id="mmSubTitle">Start subscription</div>
              <div class="text-muted" style="font-size: 13px" id="mmSubMeta"></div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="mmSubAlert" class="alert d-none" role="alert"></div>
            <form id="mmSubForm">
              <input type="hidden" name="product_id" />
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label">Quantity</label>
                  <input name="quantity" type="number" min="1" class="form-control mm-input" value="1" />
                </div>
                <div class="col-6">
                  <label class="form-label">Frequency</label>
                  <select name="frequency" class="form-select mm-input">
                    <option value="daily" selected>Daily</option>
                    <option value="alternate">Alternate</option>
                    <option value="weekly">Weekly</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Start date</label>
                  <input name="start_date" type="date" class="form-control mm-input" />
                </div>
              </div>
              <div class="mm-card p-3 mt-3">
                <div class="d-flex justify-content-between">
                  <div class="text-muted">Estimated monthly cost</div>
                  <div class="fw-bold" id="mmSubEstimate">-</div>
                </div>
                <div class="text-muted mt-1" style="font-size: 13px" id="mmSubBreakdown"></div>
              </div>
              <button class="btn mm-btn-primary w-100 mt-3" type="submit">Confirm subscription</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      const accountLink = document.getElementById("mm-account-link");
      const logoutBtn = document.getElementById("mm-logout");
      const escapeHtml = window.MilkMan.utils.escapeHtml;
      const formatCurrency = window.MilkMan.utils.formatCurrency;
      const productImageSources = window.MilkMan.products.getImageSources;
      const fallbackImage = window.MilkMan.products.defaultImage;

      function setLoggedIn(isLoggedIn) {
        if (isLoggedIn) {
          accountLink.textContent = "Dashboard";
          accountLink.href = "dashboard.html";
          logoutBtn.classList.remove("d-none");
        } else {
          accountLink.textContent = "Login";
          accountLink.href = "login.html";
          logoutBtn.classList.add("d-none");
        }
      }

      function hydrateImages(scope) {
        scope.querySelectorAll("img[data-fallback]").forEach((img) => {
          img.addEventListener("error", () => {
            const current = img.getAttribute("src");
            const fallbacks = JSON.parse(img.dataset.fallbacks || "[]");
            const next = fallbacks.shift();

            if (fallbacks.length) {
              img.dataset.fallbacks = JSON.stringify(fallbacks);
            } else {
              img.removeAttribute("data-fallbacks");
            }

            if (next && current !== next) {
              img.setAttribute("src", next);
              return;
            }
            if (img.dataset.final && current !== img.dataset.final) {
              img.setAttribute("src", img.dataset.final);
            }
          });
        });
      }

      logoutBtn.addEventListener("click", async () => {
        await window.MilkMan.auth.logout();
        setLoggedIn(false);
      });

      (async () => {
        try {
          await window.MilkMan.auth.me();
          setLoggedIn(true);
        } catch {
          setLoggedIn(false);
        }
      })();

      const productsEl = document.getElementById("mm-products");
      const loadingEl = document.getElementById("mm-products-loading");
      const emptyEl = document.getElementById("mm-products-empty");

      const modalEl = document.getElementById("mmSubModal");
      const modal = new bootstrap.Modal(modalEl);
      const form = document.getElementById("mmSubForm");
      const alertBox = document.getElementById("mmSubAlert");
      const estimateEl = document.getElementById("mmSubEstimate");
      const breakdownEl = document.getElementById("mmSubBreakdown");

      function showAlert(type, message) {
        alertBox.className = "alert";
        alertBox.classList.add(type === "success" ? "alert-success" : "alert-danger");
        alertBox.textContent = message;
        alertBox.classList.remove("d-none");
      }

      function hideAlert() {
        alertBox.classList.add("d-none");
      }

      function setTodayAsDefaultStart() {
        const start = form.querySelector("[name=start_date]");
        if (!start.value) {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, "0");
          const dd = String(today.getDate()).padStart(2, "0");
          start.value = `${yyyy}-${mm}-${dd}`;
        }
      }

      async function requireLogin() {
        try {
          await window.MilkMan.auth.me();
          return true;
        } catch {
          sessionStorage.setItem("mm_next", window.location.href);
          window.location.href = "login.html";
          return false;
        }
      }

      async function refreshEstimate() {
        const productId = form.querySelector("[name=product_id]").value;
        const quantity = form.querySelector("[name=quantity]").value || 1;
        const frequency = form.querySelector("[name=frequency]").value || "daily";
        try {
          const preview = await window.MilkMan.apiFetch(
            `/api/subscriptions/preview?product_id=${encodeURIComponent(productId)}&quantity=${encodeURIComponent(
              quantity
            )}&frequency=${encodeURIComponent(frequency)}`
          );
          estimateEl.textContent = formatCurrency(preview.estimated_monthly_total || 0);
          breakdownEl.textContent = `${preview.deliveries_per_month} deliveries/month | ${formatCurrency(
            preview.unit_price || 0
          )} per unit`;
        } catch {
          estimateEl.textContent = "-";
          breakdownEl.textContent = "";
        }
      }

      async function openSubscribe(product) {
        const ok = await requireLogin();
        if (!ok) return;
        hideAlert();
        form.reset();
        form.querySelector("[name=product_id]").value = product.id;
        document.getElementById("mmSubTitle").textContent = `Subscribe: ${product.name}`;
        document.getElementById("mmSubMeta").textContent = `${product.size || ""} | ${formatCurrency(
          product.price || 0
        )}`;
        setTodayAsDefaultStart();
        await refreshEstimate();
        modal.show();
      }

      function productCard(product) {
        const image = productImageSources(product);
        return `
          <article class="mm-card mm-product-card h-100">
            <div class="mm-product-media">
              <img
                class="mm-product-image"
                src="${escapeHtml(image.primary)}"
                alt="${escapeHtml(product.name || "MilkMan product")}"
                data-fallback="${escapeHtml((image.fallbacks && image.fallbacks[0]) || fallbackImage)}"
                data-fallbacks='${escapeHtml(JSON.stringify(image.fallbacks || []))}'
                data-final="${escapeHtml(image.final || fallbackImage)}"
                loading="lazy"
              />
            </div>
            <div class="mm-product-body">
              <div class="mm-product-meta">
                <h2 class="mm-product-title">${escapeHtml(product.name || "Untitled product")}</h2>
                <div class="mm-product-price">${formatCurrency(product.price || 0)}</div>
              </div>
              <p class="mm-product-copy">${escapeHtml(
                product.description || "Fresh dairy delivered to your doorstep."
              )}</p>
              <div class="mm-product-footer">
                <div>
                  <div class="mm-product-note">${escapeHtml(product.size || "Available in multiple sizes")}</div>
                </div>
                <button class="mm-product-cta border-0" type="button">Subscribe</button>
              </div>
            </div>
          </article>
        `;
      }

      form.addEventListener("input", () => refreshEstimate());

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAlert();
        const fd = new FormData(form);
        const payload = Object.fromEntries(fd.entries());
        payload.quantity = Number(payload.quantity || 1);
        try {
          await window.MilkMan.apiFetch("/api/subscriptions/", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          showAlert("success", "Subscription created successfully");
          setTimeout(() => window.location.replace("dashboard.html"), 700);
        } catch (err) {
          showAlert("error", err.message || "Subscription failed");
        }
      });

      (async () => {
        try {
          const products = await window.MilkMan.apiFetch("/api/products/");
          loadingEl.classList.add("d-none");
          if (!products || !products.length) {
            emptyEl.classList.remove("d-none");
            return;
          }
          products.forEach((product) => {
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-xl-4";
            col.innerHTML = productCard(product);
            hydrateImages(col);
            col.querySelector("button").addEventListener("click", () => openSubscribe(product));
            productsEl.appendChild(col);
          });
        } catch (err) {
          loadingEl.classList.add("d-none");
          emptyEl.classList.remove("d-none");
        }
      })();
    </script>
  </body>
</html>
