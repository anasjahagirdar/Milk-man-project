<!DOCTYPE html>
<html ng-app="milkApp">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MilkMan Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
</head>
<body ng-cloak ng-class="isAuthRoute() ? 'admin-login-body' : 'admin-shell-body'">

<div class="admin-auth-shell" ng-if="isAuthRoute()">
  <div ng-view></div>
</div>

<div class="admin-shell" ng-if="!isAuthRoute()">
  <aside class="admin-sidebar" ng-class="{'is-open': sidebarOpen}">
    <div class="d-flex flex-column h-100">
      <div>
        <div class="admin-brand">
          <div class="admin-brand-mark">
            <i class="bi bi-droplet-half"></i>
          </div>
          <div class="admin-brand-text">
            <strong>MilkMan</strong>
            <span>Delivery operations</span>
          </div>
        </div>

        <div class="admin-sidebar-label">Navigation</div>
        <nav class="admin-nav">
          <a
            ng-repeat="item in navItems"
            class="admin-nav-link"
            ng-class="{'is-active': isActive(item.path)}"
            href="#!{{item.path}}"
            ng-click="closeSidebar()"
          >
            <i class="bi {{item.icon}}"></i>
            <span>{{item.label}}</span>
          </a>
        </nav>
      </div>

      <div class="admin-sidebar-footer">
        <div class="admin-sidebar-card">
          <h6>Daily operations at a glance</h6>
          <p>Monitor customers, orders, products, and recurring subscriptions from a single control panel.</p>
        </div>
      </div>
    </div>
  </aside>

  <button class="admin-backdrop" ng-if="sidebarOpen" ng-click="closeSidebar()"></button>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="admin-topbar-left">
        <button class="admin-menu-btn" ng-click="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <div class="admin-page-eyebrow">{{currentRouteMeta.eyebrow}}</div>
          <h1 class="admin-page-title">{{currentRouteMeta.label}}</h1>
        </div>
      </div>

      <div class="admin-topbar-right">
        <div class="admin-topbar-chip">
          <i class="bi bi-shield-check"></i>
          <span>Secure admin session</span>
        </div>
        <div class="admin-user-chip">
          <span>{{adminName}}</span>
          <strong>{{currentRouteMeta.short}}</strong>
        </div>
        <button class="logout-btn" ng-click="logout()">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </button>
      </div>
    </header>

    <main class="admin-content">
      <div ng-view></div>
    </main>
  </div>
</div>

<script src="app.js"></script>
<script src="controllers/authController.js"></script>
<script src="controllers/customerController.js"></script>
<script src="controllers/staffController.js"></script>
<script src="controllers/categoryController.js"></script>
<script src="controllers/productController.js"></script>
<script src="controllers/subscriptionController.js"></script>
<script src="controllers/orderController.js"></script>
<script src="controllers/dashboardController.js"></script>

</body>
</html>
