<div class="container">

<h3 class="mb-4">Products</h3>

<div class="card p-3 mb-4">

<input class="form-control mb-2" placeholder="Name" ng-model="name">

<select class="form-control mb-2" ng-model="category_id"
        ng-options="c.id as c.name for c in categories">
<option value="">Select Category</option>
</select>

<input class="form-control mb-2" placeholder="Size (e.g., 500, 1, 200g)" ng-model="size">

<select class="form-control mb-2" ng-model="unit"
        ng-options="u for u in units">
<option value="">Select Unit</option>
</select>

<input class="form-control mb-2" placeholder="Price" ng-model="price">
<input class="form-control mb-2" placeholder="Stock" ng-model="stock">

<div class="form-check mb-2">
  <input class="form-check-input" type="checkbox" id="activeCheck" ng-model="is_active" ng-init="is_active=true">
  <label class="form-check-label" for="activeCheck">Active product</label>
</div>

<button class="btn btn-primary" ng-click="add()">Save Product</button>

</div>

<div class="d-flex justify-content-between align-items-center mb-2">
  <input class="form-control" style="max-width:280px" placeholder="Search products" ng-model="search">
  <small class="text-muted">Showing {{(filtered()||[]).length}} items</small>
  </div>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Size</th>
<th>Unit</th>
<th>Price</th>
<th>Stock</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr ng-repeat="p in filtered()">

<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>{{categoryMap[p.category_id]}}</td>
<td>{{p.size}}</td>
<td>{{p.unit}}</td>
<td>{{p.price}}</td>
<td>{{p.stock}}</td>
<td>
  <span class="badge" ng-class="{'bg-success': p.is_active, 'bg-secondary': !p.is_active}">
    {{p.is_active ? 'Active' : 'Inactive'}}
  </span>
</td>

<td>

<button class="btn btn-warning btn-sm me-1"
        ng-click="edit(p)">
Edit
</button>

<button class="btn btn-danger btn-sm"
        ng-click="remove(p.id)">
Delete
</button>

</td>

</tr>

</table>

</div>
